<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baca Buku | Perpustakaan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
:root{
  --purple:#5b2c83;
  --purple-light:#6f3aa6;
  --bg:#f3f4f8;
  --text:#222;
}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== HEADER ===== */
.reader-header{
  position:sticky;
  top:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  z-index:1000;
}

.reader-header .left{
  display:flex;
  align-items:center;
  gap:14px;
}

.reader-header h1{
  font-size:16px;
  margin:0;
  font-weight:600;
}

.icon-btn{
  font-size:24px;
  cursor:pointer;
  color:var(--purple);
  transition:.2s;
}

.icon-btn:hover{
  color:var(--purple-light);
}

/* ===== LAYOUT ===== */
.reader-container{
  max-width:1600px;
  margin:auto;
  display:grid;
  grid-template-columns:340px 1fr;
  gap:22px;
  padding:22px;
}

/* ===== SIDEBAR ===== */
.book-info{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.book-info img{
  width:100%;
  border-radius:10px;
  margin-bottom:14px;
}

.meta{
  font-size:14px;
  line-height:1.7;
}

.meta p{
  display:flex;
  align-items:flex-start;
  gap:8px;
  margin:6px 0;
}

.meta i{
  color:var(--purple);
  margin-top:3px;
}

.meta strong{
  color:var(--purple);
}

/* tombol aksi */
.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  text-align:center;
  padding:11px;
  border-radius:8px;
  background:var(--purple);
  color:#fff;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
  transition:.2s;
}

.btn:hover{
  background:var(--purple-light);
}

/* ===== READER ===== */
.reader{
  background:#000;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.reader iframe{
  width:100%;
  height:calc(100vh - 110px);
  border:none;
  display:block;
  min-height:1200px;
}

/* supaya zoom tidak kepotong */
.reader{
  overflow:auto;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .reader-container{
    grid-template-columns:1fr;
  }

  .reader iframe{
    height:75vh;
  }
}

/* ===== DARK MODE ===== */
.dark-mode{
  --bg:#121212;
  --text:#e4e4e4;
}

.dark-mode .reader-header,
.dark-mode .book-info{
  background:#1e1e1e;
}

.dark-mode .reader{
  background:#000;
}

/* ===== FLOAT BUTTONS ===== */
.reader-tools{
  position:fixed;
  bottom:18px;
  right:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.tool-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:var(--purple);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}

/* ===== PROGRESS BAR ===== */
.progress-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:6px;
  background:#ddd;
  z-index:999;
}

.progress{
  height:100%;
  width:0%;
  background:var(--purple);
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="reader-header">
  <div class="left">
    <i class='bx bx-arrow-back icon-btn' onclick="history.back()" title="Kembali"></i>
    <h1 id="bookTitle">Memuat Buku...</h1>
  </div>
  <div>
    <i class='bx bx-fullscreen icon-btn' onclick="fullscreenReader()" title="Fullscreen"></i>
  </div>
</div>

<div class="reader-container">

  <!-- INFO BUKU -->
  <div class="book-info" id="bookInfo"></div>

  <!-- VIEWER -->
  <div class="reader">
    <iframe id="pdfViewer"></iframe>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw_OPaeB6nfsATcGNnwVKHbAkBvFmydPeog9tIxMFFNWB1vbj1zLtdLlurzzFqihGd6hA/exec";

const params = new URLSearchParams(window.location.search);
const fileID = params.get("id");

fetch(API_URL)
.then(res=>res.json())
.then(data=>{
  const book = data.find(b=>b.FileID===fileID);
  if(!book) return;

  document.getElementById("bookTitle").innerText = book.Judul;

  document.getElementById("bookInfo").innerHTML = `
    <img src="${book.CoverURL}">

    <div class="meta">
  <p><i class='bx bx-book'></i><strong>Judul:</strong> ${book.Judul}</p>
  <p><i class='bx bx-user'></i><strong>Penulis:</strong> ${book.Penulis}</p>
  <p><i class='bx bx-buildings'></i><strong>Penerbit:</strong> ${book.Penerbit}</p>
  <p><i class='bx bx-calendar'></i><strong>Tahun:</strong> ${book.Tanggal}</p>
  <p><i class='bx bx-file'></i><strong>Halaman:</strong> ${book.Halaman}</p>
  <p><i class='bx bx-globe'></i><strong>Bahasa:</strong> ${book.Bahasa}</p>
  <p><i class='bx bx-barcode'></i><strong>ISBN/ISSN:</strong> ${book.ISBN}</p>

  <p><i class='bx bx-hdd'></i><strong>Berat Buku:</strong> ${book.Berat}</p>
  <p><i class='bx bx-ruler'></i><strong>Ukuran Buku:</strong> ${book.Ukuran}</p>
  <p><i class='bx bx-archive'></i><strong>Asal Dokumen:</strong> ${book["Asal"]}</p>

  <p style="margin-top:10px">${book.Tentang}</p>
</div>
    <div class="actions">
      <a href="https://drive.google.com/file/d/${book.FileID}/view" target="_blank" class="btn">
        <i class='bx bx-link-external'></i> Drive
      </a>
      <a href="https://drive.google.com/uc?export=download&id=${book.FileID}" class="btn">
        <i class='bx bx-download'></i> Unduh
      </a>
    </div>
  `;

  document.getElementById("pdfViewer").src =
    `https://drive.google.com/file/d/${book.FileID}/preview`;
});

function fullscreenReader(){
  const iframe = document.getElementById("pdfViewer");
  if(iframe.requestFullscreen){
    iframe.requestFullscreen();
  }
}
</script>

<div class="reader-tools">
  <button class="tool-btn" onclick="toggleDark()" title="Mode Gelap">
    <i class='bx bx-moon'></i>
  </button>
  <button class="tool-btn" onclick="zoomIn()" title="Perbesar">
    <i class='bx bx-zoom-in'></i>
  </button>
  <button class="tool-btn" onclick="zoomOut()" title="Perkecil">
    <i class='bx bx-zoom-out'></i>
  </button>
</div>

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<script>
/* =========================
   DARK MODE
========================= */
function toggleDark(){
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("darkMode",
    document.body.classList.contains("dark-mode"));
}

// load dark mode
if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark-mode");
}

/* =========================
   ZOOM READER
========================= */
let zoomLevel = 1;

function zoomIn(){
  zoomLevel += 0.1;
  viewer.style.transform = `scale(${zoomLevel})`;
  viewer.style.transformOrigin = "top left";
}

function zoomOut(){
  zoomLevel -= 0.1;
  if(zoomLevel < 0.6) zoomLevel = 0.6;
  viewer.style.transform = `scale(${zoomLevel})`;
}

/* =========================
   PROGRESS MEMBACA
========================= */
const viewer = document.getElementById("pdfViewer");
const progressBar = document.getElementById("progress");

viewer.onload = () => {
  const saved = localStorage.getItem("readProgress_"+fileID);
  if(saved){
    viewer.contentWindow.scrollTo(0, saved);
  }
};

// simpan posisi scroll
setInterval(()=>{
  try{
    const y = viewer.contentWindow.scrollY;
    const h = viewer.contentDocument.body.scrollHeight;
    const progress = (y/h)*100;

    progressBar.style.width = progress+"%";

    localStorage.setItem("readProgress_"+fileID, y);
  }catch(e){}
},1000);
</script>

</body>
</html>
